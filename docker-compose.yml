services:
  # 1. Express Backend API
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: optic-backend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./src/backend/.env
    environment:
      - CLIENT_URL=${CLIENT_URL}
    volumes:
      - optic_uploads:/app/uploads
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "node -e 'const http = require(\"http\"); http.get(\"http://localhost:3000/api/status\", (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 2. React Frontend Client
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    container_name: optic-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  optic_uploads:
    driver: local


