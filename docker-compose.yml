version: '3.8'

services:
  # 1. Express Backend API
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: optic-backend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./src/backend/.env
    environment:
      - CLIENT_URL=http://13.212.12.171

  # 2. React Frontend Client
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://13.212.12.171
    container_name: optic-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - ./src/frontend/.env
    depends_on:
      - backend

