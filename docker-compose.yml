version: '3.8'

services:
  # 1. Cơ sở dữ liệu MongoDB
  database:
    image: mongo:latest
    container_name: optic-database
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # 2. Express Backend API
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: optic-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./src/backend/.env
    environment:
      - MONGO_URI=mongodb://database:27017/SWP
      - MONGODB_URI=mongodb://database:27017/SWP
      - CLIENT_URL=http://localhost
    depends_on:
      - database

  # 3. React Frontend Client
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: optic-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - ./src/frontend/.env
    depends_on:
      - backend

volumes:
  mongo-data:
    driver: local
